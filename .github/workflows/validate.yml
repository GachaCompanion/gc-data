name: Validate Banner Timing
on:
  schedule:
    - cron: '30 4 * * 2'   # Tuesday 06:30 GMT+2
    - cron: '30 18 * * 2'  # Tuesday 20:30 GMT+2
    - cron: '30 4 * * 3'   # Wednesday 06:30 GMT+2
    - cron: '30 18 * * 3'  # Wednesday 20:30 GMT+2
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
      - name: Run timing validator
        run: node scripts/validators/validate-timing.js
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --staged --quiet || git commit -m "validate: fix banner timing $(date -u +%Y-%m-%d)"
          git push
